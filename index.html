<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartChat AI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== AUTH PAGE ===== -->
  <div class="auth-page" id="auth-page">
    <div class="auth-container">
      <h1>🤖 SmartChat AI</h1>
      <p class="auth-subtitle">Your personal AI assistant</p>

      <!-- Login Form -->
      <div id="login-form">
        <h2>Welcome Back!</h2>
        <input type="email" id="login-email" placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button id="login-btn">Login</button>
        <p class="auth-switch">
          Don't have account?
          <span onclick="showSignup()">Sign Up</span>
        </p>
        <p class="auth-error" id="login-error"></p>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" style="display:none">
        <h2>Create Account</h2>
        <input type="text" id="signup-name" placeholder="Your Name" />
        <input type="email" id="signup-email" placeholder="Email" />
        <input type="password" id="signup-password" placeholder="Password" />
        <button id="signup-btn">Sign Up</button>
        <p class="auth-switch">
          Already have account?
          <span onclick="showLogin()">Login</span>
        </p>
        <p class="auth-error" id="signup-error"></p>
      </div>
    </div>
  </div>

  <!-- ===== CHAT PAGE ===== -->
  <div class="chat-page" id="chat-page" style="display:none">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>🤖 SmartChat</h3>
        <button id="new-chat-btn">+ New</button>
      </div>

      <div class="chat-list" id="chat-list"></div>

      <div class="sidebar-footer">
        <p id="user-name-display">👤 User</p>
        <button id="logout-btn">Logout</button>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main-chat">

      <!-- Header -->
      <div class="chat-header">
        <button id="toggle-sidebar">☰</button>
        <div class="header-info">
          <h2 id="bot-name">🤖 SmartChat AI</h2>
          <p class="status">● Always online</p>
        </div>
        <button id="clear-btn">Clear</button>
      </div>

      <!-- Personality Bar -->
      <div class="personality-bar">
        <button class="personality-btn active" data-personality="smart">🤖 Smart</button>
        <button class="personality-btn" data-personality="funny">😄 Funny</button>
        <button class="personality-btn" data-personality="study">👨‍🏫 Study</button>
        <button class="personality-btn" data-personality="career">💼 Career</button>
        <button class="personality-btn" data-personality="interview">🎯 Interview</button>
      </div>

      <!-- Messages -->
      <div class="chat-box" id="chat-box"></div>

      <!-- Input Area -->
      <div class="chat-input-area">

        <!-- Image Preview Bar -->
        <div class="image-preview-bar" id="image-preview-bar" style="display:none">
          <img id="preview-img" src="" alt="preview"/>
          <span id="preview-text">Image ready — type your question below</span>
          <button id="remove-image-btn">✕</button>
        </div>

        <!-- Input Row -->
        <div class="chat-input">
          <button id="voice-btn" title="Voice">🎤</button>
          <button id="camera-btn" title="Image">📷</button>
          <button id="mute-btn" title="Mute">🔊</button>
          <input type="file" id="file-input" accept="image/*" style="display:none"/>
          <input type="text" id="user-input" placeholder="Type or speak..."/>
          <button id="send-btn">Send ➤</button>
        </div>

      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
