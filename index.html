<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartChat AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <div class="chat-container">

      <!-- Header -->
      <div class="chat-header">
        <div class="header-info">
          <h2 id="bot-name">🤖 SmartChat AI</h2>
          <p class="status">● Always online</p>
        </div>
        <button id="clear-btn">Clear</button>
      </div>

      <!-- Personality Selector -->
      <div class="personality-bar">
        <button class="personality-btn active" data-personality="smart">
          🤖 Smart
        </button>
        <button class="personality-btn" data-personality="funny">
          😄 Funny
        </button>
        <button class="personality-btn" data-personality="study">
          👨‍🏫 Study
        </button>
        <button class="personality-btn" data-personality="career">
          💼 Career
        </button>
        <button class="personality-btn" data-personality="interview">
          🎯 Interview
        </button>
      </div>

      <!-- Messages area -->
      <div class="chat-box" id="chat-box"></div>

      <!-- Input area -->
      <div class="chat-input">
        <button id="voice-btn" title="Voice Input">🎤</button>
        <button id="camera-btn" title="Upload Image">📷</button>
        <button id="mute-btn" title="Mute AI Voice">🔊</button>
        <input
          type="file"
          id="file-input"
          accept="image/*"
          style="display:none"
        />
        <input
          type="text"
          id="user-input"
          placeholder="Type or speak..."
        />
        <button id="send-btn">Send ➤</button>
      </div>

    </div>

    <script src="script.js"></script>
  </body>

</html>
